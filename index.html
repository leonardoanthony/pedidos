<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
  <title>Consulta de Pedido</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #111111;
      --primary-light: #2C2C2C;
      --secondary: #F5F5F5;
      --background: #FFFFFF;
      --accent: #6A8D73;
      --accent-dark: #57715D;
      --text: #111111;
      --text-light: #666666;
      --border: #E9E9E9;
      --success: #30B566;
      --warning: #F2B544;
      --danger: #E45D5D;
      --radius-xs: 6px;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 22px;
      --radius-xl: 32px;
      --shadow-sm: 0 4px 12px rgba(0,0,0,.05);
      --shadow-md: 0 10px 30px rgba(0,0,0,.08);
      --shadow-lg: 0 20px 60px rgba(0,0,0,.12);
      --space-xs: 8px;
      --space-sm: 16px;
      --space-md: 24px;
      --space-lg: 40px;
      --space-xl: 64px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fafafa;
      color: var(--text);
      padding: var(--space-lg) var(--space-sm);
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: var(--space-md);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }

    h2 {
      text-align: center;
      color: var(--text);
      font-size: 34px;
      font-weight: 700;
      margin-bottom: var(--space-md);
    }

    input[type="text"] {
      width: 100%;
      padding: var(--space-sm);
      margin-bottom: var(--space-sm);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      width: 100%;
      padding: var(--space-sm) var(--space-md);
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: .25s;
    }

    button:hover {
      background: var(--primary-light);
    }

    .not-found {
      color: var(--danger);
      text-align: center;
      margin-top: var(--space-sm);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: var(--space-sm);
    }

    th, td {
      border: 1px solid var(--border);
      padding: var(--space-xs) var(--space-sm);
      text-align: center;
    }

    th {
      background-color: var(--secondary);
      font-weight: 600;
    }

    .subtotal {
      text-align: right;
      font-weight: 700;
      margin-top: var(--space-sm);
      font-size: 18px;
    }

    .status {
      margin-top: var(--space-md);
      font-weight: 700;
      font-size: 18px;
    }

    .badge {
      display: inline-block;
      padding: var(--space-xs) var(--space-sm);
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
    }

    .badge.success {
      background: #EAF8EF;
      color: var(--success);
    }

    .badge.warning {
      background: #FFF7E6;
      color: var(--warning);
    }

    .badge.danger {
      background: #FFECEC;
      color: var(--danger);
    }

    .pagamentos-table {
      margin-top: var(--space-sm);
    }

    .pagamentos-table td {
      text-align: left;
    }

    #pix {
      margin-top: var(--space-md);
      font-size: 14px;
      text-align: center;
      color: var(--text-light);
    }

    #copyPix {
      cursor: pointer;
      color: var(--accent);
      text-decoration: underline;
    }

    .overflow-x-scroll {
      overflow-x: scroll;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Consulta de Pedido</h2>
    <input type="text" id="nameInput" maxlength="4" placeholder="Digite seu cod (ex: 4321)">
    <button onclick="buscarPedido()">Buscar</button>
    <div id="resultado"></div>
    <div id="pix">
      <b>Pix:</b> leonardoanthony8@gmail.com <span onclick="copiarTexto()" id="copyPix">(copiar)</span>
    </div>
  </div>

  <script src="pedidos.js"></script>
  <script>
    function getStatusClass(status) {
      const s = status.toLowerCase();
      if (s === 'entregue' || s === 'pago') return 'success';
      if (s === 'atrasado' || s === 'em aberto') return 'danger';
      return 'warning';
    }

    function buscarPedido() {
      const code = document.getElementById('nameInput').value.trim();
      const resultadoDiv = document.getElementById('resultado');
      resultadoDiv.innerHTML = "";

      const pedido = pedidos.find(p => p.code == code);

      if (!pedido) {
        resultadoDiv.innerHTML = `<p class="not-found">Pedido não encontrado.</p>`;
        return;
      }

      let totalGeral = 0;
      const linhasItens = pedido.itens.map(i => {
        const total = i.quantidade * i.valorUnitario;
        totalGeral += total;
        return `
          <tr>
            <td>${i.item}</td>
            <td>${i.tamanho}</td>
            <td>${i.quantidade}</td>
            <td>R$ ${i.valorUnitario.toFixed(2)}</td>
            <td>R$ ${total.toFixed(2)}</td>
          </tr>`;
      }).join('');

      const tabelaItens = `
        <div class="overflow-x-scroll">
        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>Tamanho</th>
              <th>Quantidade</th>
              <th>Valor Unitário</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody>
            ${linhasItens}
          </tbody>
        </table>
        </div>
        <p class="subtotal">Subtotal: R$ ${totalGeral.toFixed(2)}</p>
      `;

      const tabelaPagamentos = `
        <table class="pagamentos-table">
          <thead>
            <tr>
              <th>Mês</th>
              <th>Valor</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            ${pedido.pagamentos.map(p => `
              <tr>
                <td>${p.mes}</td>
                <td>R$ ${p.valor.toFixed(2)}</td>
                <td><span class="badge ${getStatusClass(p.status)}">${p.status}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>
      `;

      resultadoDiv.innerHTML = `
        <h3 style="margin-top: var(--space-md); font-size: 24px; font-weight: 600;">Nota de Pedido – ${pedido.nome}</h3>
        ${tabelaItens}
        <p class="status">Status do Pedido: <span class="badge ${getStatusClass(pedido.status)}">${pedido.status}</span></p>
        <h4 style="margin-top: var(--space-md); font-size: 18px; font-weight: 600;">Pagamentos:</h4>
        ${tabelaPagamentos}
      `;
    }

    document.getElementById("nameInput").addEventListener("keypress", function (e) {
      if (e.key === "Enter") buscarPedido();
    });

    function copiarTexto() {
      const texto = "leonardoanthony8@gmail.com";
      navigator.clipboard.writeText(texto).then(() => {
        alert("Texto copiado: " + texto);
      }).catch(err => {
        console.error('Erro ao copiar o texto: ', err);
      });
    }
  </script>
</body>
</html>
